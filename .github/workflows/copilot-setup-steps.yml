# Copilot coding-agent environment setup
#
# This workflow is picked up automatically by GitHub Copilot coding agent.
# It runs before the agent begins its task and prepares a working Android
# build environment and a running Android emulator for the agent to use
# (app install, screenshots, instrumentation-style interaction).
#
# Why the previous version hung
# ──────────────────────────────
# The old workflow booted the emulator with a hand-rolled shell loop:
#   • It used -gpu swiftshader_indirect (pure software rendering) without
#     enabling KVM, so every boot took far longer than the 5-minute budget.
#   • `adb wait-for-device` blocks until the transport layer is up, but with
#     software rendering the emulator process often stalls before ADB even
#     connects, causing an indefinite hang.
#
# Why this version is reliable
# ─────────────────────────────
# reactivecircus/android-emulator-runner@v2 is the industry-standard action
# for running Android emulators on GitHub-hosted Ubuntu runners. It:
#   • Enables KVM acceleration automatically (hardware-assisted virtualisation
#     is available on GitHub-hosted ubuntu-latest runners).
#   • Handles AVD creation, emulator launch, and boot detection internally
#     using a proven, well-maintained implementation.
#   • Uses a configurable boot-timeout (default 600 s) rather than a fixed
#     5-minute loop, giving the emulator adequate time to finish booting.
#
# Emulator persistence
# ─────────────────────
# The action starts the emulator as a background process, waits for boot,
# and then runs the provided `script`. After the step exits, the emulator
# process keeps running until the job's post-step cleanup phase – which runs
# only after ALL steps have completed. This means the emulator is available
# to the Copilot agent's own steps throughout the job.

name: Copilot setup steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM device permissions are required for hardware-accelerated emulation
      # on GitHub-hosted Ubuntu runners.
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Starts the emulator in the background, waits for full boot, then runs
      # the inline script. The emulator process keeps running after this step
      # exits so subsequent agent steps can interact with it via adb.
      - name: Start Android emulator (API 34)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          # KVM accelerates CPU virtualisation; swiftshader_indirect provides
          # software OpenGL rendering because GitHub-hosted runners have no
          # physical GPU. This combination (KVM + swiftshader_indirect) is the
          # standard recommended setup for headless Ubuntu emulation.
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
          disable-animations: true
          script: echo "Emulator booted and ready for Copilot agent use"

      - name: Verify environment
        run: |
          echo "=== Java ==="
          java -version

          echo "=== Gradle ==="
          ./gradlew --version

          echo "=== adb ==="
          adb version

          echo "=== Connected devices ==="
          adb devices
