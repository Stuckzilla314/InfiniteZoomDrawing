name: Android build and release

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run debug unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Verify release APK is signed
        run: |
          if ls app/build/outputs/apk/release/*-unsigned.apk >/dev/null 2>&1; then
            echo "Unsigned APKs must not be published."
            ls app/build/outputs/apk/release
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: release-artifact

      - name: Prepare release metadata
        id: release_metadata
        run: |
          echo "tag=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "name=Main build ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_metadata.outputs.tag }}
          name: ${{ steps.release_metadata.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: release-artifact/*.apk
          fail_on_unmatched_files: true
