name: Android build and release

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run debug unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Verify release APK is signed
        run: |
          if ls app/build/outputs/apk/release/*-unsigned.apk >/dev/null 2>&1; then
            echo "Unsigned APKs must not be published."
            ls app/build/outputs/apk/release
            exit 1
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: android-release-apk
          path: release-artifact

      - name: Prepare release metadata
        id: release_metadata
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_SHA="${{ github.event.pull_request.head.sha }}"
            echo "pr_prefix=PR-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "tag=PR-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "name=PR #${{ github.event.pull_request.number }} build ${PR_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "target=${PR_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "pr_prefix=" >> "$GITHUB_OUTPUT"
            echo "tag=main-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "name=Main build ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "target=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove previous release for this PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_RELEASE_PREFIX: ${{ steps.release_metadata.outputs.pr_prefix }}
        with:
          script: |
            const prefix = process.env.PR_RELEASE_PREFIX;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const matchesPrefix = (tagName) =>
              tagName === prefix || tagName.startsWith(`${prefix}-`);

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (!matchesPrefix(release.tag_name)) {
                continue;
              }

              core.info(`Deleting release ${release.tag_name} (${release.id})`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_metadata.outputs.tag }}
          name: ${{ steps.release_metadata.outputs.name }}
          target_commitish: ${{ steps.release_metadata.outputs.target }}
          prerelease: true
          generate_release_notes: true
          files: release-artifact/*.apk
          fail_on_unmatched_files: true

  cleanup_pr_release:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Remove PR release
        uses: actions/github-script@v7
        env:
          PR_RELEASE_PREFIX: PR-${{ github.event.pull_request.number }}
        with:
          script: |
            const prefix = process.env.PR_RELEASE_PREFIX;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const matchesPrefix = (tagName) =>
              tagName === prefix || tagName.startsWith(`${prefix}-`);

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const release of releases) {
              if (!matchesPrefix(release.tag_name)) {
                continue;
              }

              core.info(`Deleting release ${release.tag_name} (${release.id})`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
            }
